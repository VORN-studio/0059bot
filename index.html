<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>0059Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">

    <!-- Top bar -->
    <header class="top-bar">
        <button class="icon-btn" aria-label="Back">
            ←
        </button>
        <div class="top-title">0059Bot</div>
        <button class="icon-btn" aria-label="Bot">
            🤖
        </button>
    </header>

    <main class="content">

        <!-- Balance card -->
        <section class="card balance-card">
            <div class="balance-label">Balance</div>
            <div class="balance-amount" id="balanceAmount">$0.00</div>

            <div class="balance-extra">
                <div class="balance-line">
                    <span class="balance-line-label">Earnings:</span>
                    <span id="earnRate">+$0.00 / hour</span>
                </div>
                <div class="balance-line">
                    <span class="balance-line-label">Today:</span>
                    <span id="todayAmount">$0.00</span>
                </div>
            </div>
        </section>

        <!-- Main actions -->
        <section class="grid grid-2 actions-grid">
            <button class="btn action-btn" onclick="onEarn()">
                <span class="btn-icon">⚡</span>
                <span>Earn</span>
            </button>

            <button class="btn action-btn" onclick="onInvite()">
                <span class="btn-icon">👤</span>
                <span>Invite</span>
            </button>

            <button class="btn action-btn" onclick="onWithdraw()">
                <span class="btn-icon">💳</span>
                <span>Withdraw</span>
            </button>

            <button class="btn action-btn" onclick="onUpgrades()">
                <span class="btn-icon">📈</span>
                <span>Upgrades</span>
            </button>
        </section>

        <!-- Tasks block -->
        <section class="card tasks-card">
            <div class="tasks-title">Tasks</div>

            <button class="list-btn" onclick="onClickToEarn()">
                <span>Click to Earn</span>
            </button>

            <button class="list-btn" onclick="onAutoEarn()">
                <span>Auto-Earn</span>
            </button>

            <button class="list-btn" onclick="onOpenTasks()">
                <span>Tasks</span>
            </button>
        </section>

    </main>

    <footer class="footer">
        <span>@n0059_bot</span>
    </footer>
</div>

<script src="app.js"></script>
</body>
</html>
