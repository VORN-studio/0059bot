<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>0059Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link rel="stylesheet" href="style.css?v=2" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script defer src="app.js?v=2"></script>
</head>
<body>
  <div class="app-shell">
    <!-- ՎԵՐՎԱԳԻՐ -->
    <header class="app-header">
      <div class="header-left">
        <div class="favorite-star">★</div>
      </div>
      <div class="header-title">0059Bot</div>
      <div class="header-right">
        <div class="balance-pill">
          <span class="balance-dot"></span>
          <span id="header-balance">12 530</span>
        </div>
      </div>
    </header>

    <!-- ՀԻՄՆԱԿԱՆ ՄԱՍ -->
    <main class="app-main">
      <!-- 3x3 GRID -->
      <section class="grid-section">
        <button class="tile" data-section="earn">
          <img src="icons/earn.png" alt="" class="tile-icon" />
          <span class="tile-label" data-i18n="tile_earn">Earn</span>
        </button>
        <button class="tile" data-section="invest">
          <img src="icons/invest.png" alt="" class="tile-icon" />
          <span class="tile-label" data-i18n="tile_invest">Invest</span>
        </button>
        <button class="tile" data-section="friends">
          <img src="icons/friends.png" alt="" class="tile-icon" />
          <span class="tile-label" data-i18n="tile_friends">Friends</span>
        </button>

        <button class="tile" data-section="tasks">
          <img src="icons/tasks.png" alt="" class="tile-icon" />
          <span class="tile-label" data-i18n="tile_tasks">Tasks</span>
        </button>
        <button class="tile" data-section="shop">
          <img src="icons/shop.png" alt="" class="tile-icon" />
          <span class="tile-label" data-i18n="tile_shop">Shop</span>
        </button>
        <button class="tile" data-section="games">
          <img src="icons/games.png" alt="" class="tile-icon" />
          <span class="tile-label" data-i18n="tile_games">Games</span>
        </button>

        <button class="tile" data-section="wallet">
          <img src="icons/wallet.png" alt="" class="tile-icon" />
          <span class="tile-label" data-i18n="tile_wallet">Wallet</span>
        </button>
        <button class="tile" data-section="clan">
          <img src="icons/clan.png" alt="" class="tile-icon" />
          <span class="tile-label" data-i18n="tile_clan">Clan</span>
        </button>
        <button class="tile" data-section="offers">
          <img src="icons/offers.png" alt="" class="tile-icon" />
          <span class="tile-label" data-i18n="tile_offers">Offers</span>
        </button>
      </section>

      <!-- INVITE FRIENDS -->
      <section class="invite-section">
        <button class="invite-btn" id="invite-btn" data-i18n="btn_invite_friends">
          INVITE FRIENDS
        </button>
      </section>

      <!-- VIP TASKS -->
      <section class="vip-section">
        <div class="vip-card">
          <div class="vip-icon-wrap">
            <span class="vip-icon">★</span>
          </div>
          <div class="vip-text">
            <div class="vip-title" data-i18n="vip_title">VIP TASKS</div>
            <div class="vip-subtitle" data-i18n="vip_subtitle">Earn up to $20/day</div>
          </div>
          <div class="vip-arrow">›</div>
        </div>
      </section>
    </main>

<!-- SETTINGS PAGE -->
<section id="settings-page" class="hidden settings-page">

  <h2 class="settings-title">Settings</h2>

  <div class="settings-item" id="lang-row">
    <span class="settings-label">Language</span>
    <span class="settings-value" id="current-lang">English</span>
  </div>

  <div class="settings-divider"></div>

  <div id="lang-dropdown" class="lang-dropdown hidden">
    <div class="lang-choice" onclick="changeLanguage('en')">🇬🇧 English</div>
    <div class="lang-choice" onclick="changeLanguage('ru')">🇷🇺 Русский</div>
  </div>


</section>


    <!-- ՆԵՐՔԵՎԻ ՆԱՎԲԱՐ -->
    <nav class="bottom-nav">
      <button class="nav-item nav-item-active" data-tab="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label" data-i18n="nav_home">Home</span>
      </button>
      <button class="nav-item" data-tab="activity">
        <span class="nav-icon">📊</span>
        <span class="nav-label" data-i18n="nav_activity">Activity</span>
      </button>
      <button class="nav-item" data-tab="messages">
        <span class="nav-icon">✉️</span>
        <span class="nav-label" data-i18n="nav_messages">Messages</span>
      </button>
      <button class="nav-item" data-tab="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label" data-i18n="nav_settings">Settings</span>
      </button>
    </nav>
  </div>

</body>
</html>
