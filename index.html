<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>0059Bot</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script defer src="app.js"></script>
</head>

<body>
<div class="app-shell">

<header class="header">
  <div class="title">0059Bot</div>
  <div class="balance"><span id="balanceAmount">0.00 USDT</span></div>
</header>

<main class="page" id="home-page">

  <section class="grid">
    <button class="tile" data-section="earn"><img src="icons/earn.png"><span>Earn</span></button>
    <button class="tile" data-section="invest"><img src="icons/invest.png"><span>Invest</span></button>
    <button class="tile" data-section="friends"><img src="icons/friends.png"><span>Friends</span></button>

    <button class="tile" data-section="tasks"><img src="icons/tasks.png"><span>Tasks</span></button>
    <button class="tile" data-section="shop"><img src="icons/shop.png"><span>Shop</span></button>
    <button class="tile" data-section="games"><img src="icons/games.png"><span>Games</span></button>

    <button class="tile" data-section="wallet"><img src="icons/wallet.png"><span>Wallet</span></button>
    <button class="tile" data-section="clan"><img src="icons/clan.png"><span>Clan</span></button>
    <button class="tile" data-section="offers"><img src="icons/offers.png"><span>Offers</span></button>
  </section>

  <section class="invite-box">
    <button id="invite-btn">INVITE FRIENDS</button>
  </section>

  <section class="vip-box">
    <div class="vip-card">
      <div class="vip-icon">★</div>
      <div>
        <div class="vip-title">VIP TASKS</div>
        <div class="vip-sub">Earn up to $20/day</div>
      </div>
    </div>
  </section>

</main>


<!-- WALLET PAGE -->
<main class="page hidden" id="wallet-page">
  <h2>Wallet</h2>

  <div class="section">
    <div class="label">Balance:</div>
    <div id="wallet-balance">0.00 USDT</div>
  </div>

  <div class="section card">
    <h3>TON Wallet</h3>
    <div>Status: <span id="wallet-status">Not Connected</span></div>
    <div>Address: <span id="wallet-address">—</span></div>
    <button id="wallet-connect-btn">Connect</button>
  </div>

  <div class="section card">
    <h3>Payout Wallet</h3>

    <div id="wallet-attached" class="hidden">
      <p>Network: <span id="wallet-network-text"></span></p>
      <p>Address: <span id="wallet-address-text"></span></p>
      <button onclick="openEditWallet()">Edit</button>
    </div>

    <div id="wallet-form">
      <label>Network</label>
      <select id="wallet-network">
        <option value="TON">TON</option>
        <option value="TRC20">USDT TRC20</option>
        <option value="BEP20">USDT BEP20</option>
      </select>

      <label>Address</label>
      <input id="wallet-address-input" placeholder="Enter address">

      <button onclick="saveWallet()">Save</button>
    </div>
  </div>

  <div class="section card">
    <h3>Withdraw</h3>
    <input id="withdraw-amount" placeholder="Amount">
    <button onclick="sendWithdraw()">Request Withdraw</button>
  </div>

</main>


<!-- SETTINGS PAGE -->
<main class="page hidden" id="settings-page">
  <h2>Settings</h2>

  <div class="lang-row">
    Language: <span id="current-lang">English</span>
  </div>

  <div id="lang-dropdown" class="hidden lang-box">
    <div onclick="changeLang('en')">🇬🇧 English</div>
    <div onclick="changeLang('ru')">🇷🇺 Русский</div>
  </div>
</main>


<!-- BOTTOM NAV -->
<nav class="nav">
  <button data-tab="home">🏠</button>
  <button data-tab="activity">📊</button>
  <button data-tab="messages">✉️</button>
  <button data-tab="settings">⚙️</button>
</nav>

</div>
</body>
</html>
