<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>0059Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">

    <!-- Top bar -->
    <header class="top-bar">
        <div class="top-title">0059Bot</div>

        <!-- Language toggle button -->
        <button class="icon-btn" id="langToggle" aria-label="Language">
            <span id="langFlag">🇺🇸</span>
        </button>
    </header>

    <main class="content">

        <!-- Balance card -->
        <section class="card balance-card">
            <div class="balance-label" data-i18n="balance_label">BALANCE</div>
            <div class="balance-amount" id="balanceAmount">$0.00</div>

            <div class="balance-extra">
                <div class="balance-line">
                    <span class="balance-line-label" data-i18n="earnings_label">Earnings:</span>
                    <span id="earnRate" data-i18n="earnings_value">+$0.00 / hour</span>
                </div>
                <div class="balance-line">
                    <span class="balance-line-label" data-i18n="today_label">Today:</span>
                    <span id="todayAmount">$0.00</span>
                </div>
            </div>
        </section>

        <!-- Main actions -->
        <section class="grid grid-2 actions-grid">
            <button class="btn action-btn" onclick="onEarn()">
                <span class="btn-icon">⚡</span>
                <span data-i18n="btn_earn">Earn</span>
            </button>

            <button class="btn action-btn" onclick="onInvite()">
                <span class="btn-icon">👤</span>
                <span data-i18n="btn_invite">Invite</span>
            </button>

            <button class="btn action-btn" onclick="onWithdraw()">
                <span class="btn-icon">💳</span>
                <span data-i18n="btn_withdraw">Withdraw</span>
            </button>

            <button class="btn action-btn" onclick="onUpgrades()">
                <span class="btn-icon">📈</span>
                <span data-i18n="btn_upgrades">Upgrades</span>
            </button>
        </section>

        <!-- Tasks block -->
        <section class="card tasks-card">
            <div class="tasks-title" data-i18n="tasks_title">Tasks</div>

            <button class="list-btn" onclick="onClickToEarn()">
                <span data-i18n="task_click">Click to Earn</span>
            </button>

            <button class="list-btn" onclick="onAutoEarn()">
                <span data-i18n="task_auto">Auto-Earn</span>
            </button>

            <button class="list-btn" onclick="onOpenTasks()">
                <span data-i18n="task_tasks">Tasks</span>
            </button>
        </section>

    </main>

    <footer class="footer">
        <span>@n0059_bot</span>
    </footer>
</div>

<script src="app.js"></script>
</body>
</html>
